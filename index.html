<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Emergency Hub - สายด่วนฉุกเฉินครบวงจร</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Leaflet CSS for Maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap');
        
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        #map {
            height: 380px;
            width: 100%;
            border-radius: 1.5rem;
            z-index: 1;
        }

        .tab-active {
            color: #ef4444;
            border-bottom: 3px solid #ef4444;
        }

        .category-content {
            transition: all 0.3s ease-out;
            overflow: hidden;
            max-height: 3000px; 
            opacity: 1;
        }

        .collapsed .category-content {
            max-height: 0 !important;
            opacity: 0;
            padding-top: 0 !important;
            padding-bottom: 0 !important;
            margin-top: 0 !important;
        }

        .collapsed .chevron-icon {
            transform: rotate(-90deg);
        }

        /* Side Drawer Animation */
        #side-drawer {
            transition: transform 0.3s ease-in-out;
            transform: translateX(-100%);
        }
        #side-drawer.open {
            transform: translateX(0);
        }

        .country-scroller::-webkit-scrollbar { display: none; }
        .country-scroller { -ms-overflow-style: none; scrollbar-width: none; }
        
        .btn-action:active { transform: scale(0.9); }
    </style>
</head>
<body class="pb-24">

    <!-- Header -->
    <header class="bg-red-600 text-white p-4 sticky top-0 z-[100] shadow-md">
        <div class="container mx-auto flex justify-between items-center max-w-2xl">
            <div class="flex items-center gap-3">
                <button onclick="toggleDrawer()" class="p-1 hover:bg-red-700 rounded-lg transition-colors">
                    <i data-lucide="globe" class="w-6 h-6"></i>
                </button>
                <h1 class="text-lg font-bold">Global Hub</h1>
            </div>
            <div class="flex items-center gap-1">
                <a href="https://sites.google.com/view/callalert/%E0%B8%AB%E0%B8%99%E0%B8%B2%E0%B9%81%E0%B8%A3%E0%B8%81" 
                   target="_blank" class="p-2 hover:bg-red-700 rounded-full">
                    <i data-lucide="shield-check" class="w-5 h-5"></i>
                </a>
                <button onclick="window.location.reload()" class="p-2 hover:bg-red-700 rounded-full">
                    <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Side Drawer (Country Selector) -->
    <div id="drawer-overlay" onclick="toggleDrawer()" class="fixed inset-0 bg-black/50 z-[110] hidden opacity-0 transition-opacity duration-300"></div>
    <aside id="side-drawer" class="fixed top-0 left-0 bottom-0 w-64 bg-white z-[120] shadow-2xl overflow-y-auto">
        <div class="p-6">
            <div class="flex items-center justify-between mb-6 border-b pb-4">
                <h2 class="text-lg font-bold text-gray-800 flex items-center gap-2">
                    <i data-lucide="map" class="text-red-500 w-5 h-5"></i> เลือกประเทศ
                </h2>
                <button onclick="toggleDrawer()"><i data-lucide="x" class="text-gray-400"></i></button>
            </div>
            <nav class="space-y-1" id="drawer-menu">
                <!-- Country Menu items will be injected by JS -->
            </nav>
        </div>
    </aside>

    <main class="container mx-auto p-4 max-w-2xl">
        
        <!-- Tab Content: Hotlines -->
        <div id="hotlines-section" class="space-y-6">
            
            <!-- Horizontal Country Selection -->
            <div class="space-y-2">
                <div id="country-list" class="flex gap-2 overflow-x-auto country-scroller pb-2 px-1">
                    <!-- Country buttons will be injected by JS -->
                </div>
            </div>

                </div>

                    <i data-lucide="phone-call" class="w-14 h-14"></i>
                </a>
                <p id="sos-number" class="text-5xl font-black text-red-600 tracking-tighter">191</p>
                <div class="mt-4 flex justify-center gap-2">
                    <span class="px-3 py-1 bg-red-100 text-red-600 rounded-full text-[10px] font-bold">ศูนย์รับแจ้งเหตุ</span>
                    <span class="px-3 py-1 bg-blue-100 text-blue-600 rounded-full text-[10px] font-bold">24 ชม.</span>
                </div>
            </div>

            <!-- Search Bar -->
            <div class="relative group">

                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
            </div>

            <!-- Hotline Categories -->
            <div id="categories-container" class="space-y-4">
                <!-- Categories will be injected here by JS -->
            </div>
        </div>

        <!-- Tab Content: Map -->
        <div id="map-section" class="hidden">
            <div class="bg-white p-4 rounded-3xl shadow-sm border border-gray-100 space-y-4">
                <div class="flex items-center justify-between px-2">
                    <h2 class="font-bold flex items-center gap-2">
                        <i data-lucide="map-pin" class="text-red-500"></i>
                        ค้นหาสถานที่ใกล้คุณ
                    </h2>
                    <span id="location-status" class="text-[10px] bg-gray-100 px-2 py-1 rounded text-gray-500 uppercase">GPS: Waiting</span>
                </div>
                
                <div class="relative">
                    <div id="map" class="bg-gray-50 border border-gray-100"></div>
                    <button onclick="requestLocation(true)" class="absolute bottom-4 right-4 z-[500] bg-white p-3 rounded-full shadow-lg border border-gray-200 text-blue-600 active:scale-90">
                        <i data-lucide="crosshair" class="w-6 h-6"></i>
                    </button>
                </div>
                
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="searchNearby('hospital')" class="flex flex-col items-center gap-2 p-4 bg-blue-50 text-blue-700 rounded-2xl border border-blue-100 btn-action">
                        <i data-lucide="hospital"></i> <span class="text-xs font-bold">โรงพยาบาล</span>
                    </button>
                    <button onclick="searchNearby('police station')" class="flex flex-col items-center gap-2 p-4 bg-slate-50 text-slate-700 rounded-2xl border border-slate-100 btn-action">

                    </button>
                    <button onclick="searchNearby('fire station')" class="flex flex-col items-center gap-2 p-4 bg-orange-50 text-orange-700 rounded-2xl border border-orange-100 btn-action">

                    </button>

                        <i data-lucide="pill"></i> <span class="text-xs font-bold">ร้านขายยา</span>
                    </button>
                </div>
            </div>
        </div>
    </main>

            KH: [{ id: "gen", category: "เหตุด่วน (กัมพูชา)", icon: "shield-alert", numbers: [{ name: "แจ้งตำรวจ", tel: "117", desc: "ตำรวจ" }, { name: "แจ้งดับเพลิง", tel: "118", desc: "ไฟไหม้" }, { name: "เรียกรถพยาบาล", tel: "119", desc: "เจ็บป่วย" }] }],
            LA: [{ id: "gen", category: "เหตุด่วน (ลาว)", icon: "shield-alert", numbers: [{ name: "แจ้งตำรวจ", tel: "191", desc: "ตำรวจ" }, { name: "เรียกรถพยาบาล", tel: "1195", desc: "กู้ชีพ" }, { name: "แจ้งดับเพลิง", tel: "190", desc: "ไฟไหม้" }] }],
            MM: [{ id: "gen", category: "เหตุด่วน (พม่า)", icon: "shield-alert", numbers: [{ name: "แจ้งตำรวจ", tel: "199", desc: "ตำรวจ" }, { name: "แจ้งดับเพลิง", tel: "191", desc: "ไฟไหม้" }, { name: "เรียกรถพยาบาล", tel: "192", desc: "เจ็บป่วย" }] }],
            ID: [{ id: "gen", category: "เหตุด่วน (อินโดนีเซีย)", icon: "shield-alert", numbers: [{ name: "เบอร์ฉุกเฉินหลัก", tel: "112", desc: "ทุกบริการ" }, { name: "แจ้งตำรวจ", tel: "110", desc: "ตำรวจ" }] }]
        };

        // Fallback safety
        countryData.forEach(c => {
            if (!emergencyHotlines[c.id]) {
                emergencyHotlines[c.id] = [{ id: "gen", category: "Emergency Services", icon: "shield-alert", numbers: [{ name: "Universal SOS", tel: c.mainSos, desc: "Emergency" }] }];
            }
        });

        let map;
        let userMarker;
        let userCoords = { lat: 13.7563, lng: 100.5018 }; 
        let currentCountry = "TH";
        let collapsedStates = {};

        window.onload = () => {
            lucide.createIcons();
            initCountrySelectors();
            renderHotlines();
            initMap();
            setupSearch();
        };

        function toggleDrawer() {
            const drawer = document.getElementById('side-drawer');
            const overlay = document.getElementById('drawer-overlay');
            drawer.classList.toggle('open');
            overlay.classList.toggle('hidden');
            setTimeout(() => overlay.classList.toggle('opacity-100'), 10);
        }

        function initCountrySelectors() {
            // Horizontal Bar
            const horizontalContainer = document.getElementById('country-list');
            horizontalContainer.innerHTML = countryData.map(c => `
                <button onclick="setCountry('${c.id}')" id="btn-country-${c.id}" class="country-btn btn-action whitespace-nowrap px-4 py-3 rounded-2xl border transition-all flex items-center gap-2 ${c.id === 'TH' ? 'bg-red-600 border-red-600 text-white shadow-md' : 'bg-white border-gray-100 text-gray-600'}">
                    <span class="text-lg">${c.flag}</span>
                    <span class="text-xs font-bold">${c.name}</span>
                </button>
            `).join('');

            // Drawer Menu (Side Drawer is now Country List)
            const drawerMenu = document.getElementById('drawer-menu');
            drawerMenu.innerHTML = countryData.map(c => `
                <button onclick="setCountry('${c.id}'); toggleDrawer();" id="drawer-country-${c.id}" class="drawer-country-btn w-full flex items-center gap-4 p-3 rounded-xl transition-all ${c.id === 'TH' ? 'bg-red-50 text-red-600 font-bold' : 'text-gray-600 hover:bg-gray-50'}">
                    <span class="text-2xl">${c.flag}</span>
                    <span class="text-sm">${c.name}</span>
                    ${c.id === 'TH' ? '<i data-lucide="check" class="w-4 h-4 ml-auto text-red-500"></i>' : ''}
                </button>
            `).join('');
            lucide.createIcons();
        }

        function setCountry(id) {
            currentCountry = id;
            
            // Update Horizontal Buttons
            document.querySelectorAll('.country-btn').forEach(btn => {
                btn.className = 'country-btn btn-action whitespace-nowrap px-4 py-3 rounded-2xl border transition-all flex items-center gap-2 bg-white border-gray-100 text-gray-600';
            });
            const activeBtn = document.getElementById(`btn-country-${id}`);
            if(activeBtn) activeBtn.className = 'country-btn btn-action whitespace-nowrap px-4 py-3 rounded-2xl border transition-all flex items-center gap-2 bg-red-600 border-red-600 text-white shadow-md';

            // Update Drawer Buttons
            document.querySelectorAll('.drawer-country-btn').forEach(btn => {
                const countryName = btn.querySelector('.text-sm').innerText;
                const flag = btn.querySelector('.text-2xl').innerText;
                btn.className = 'drawer-country-btn w-full flex items-center gap-4 p-3 rounded-xl transition-all text-gray-600 hover:bg-gray-50';
                btn.innerHTML = `<span class="text-2xl">${flag}</span><span class="text-sm">${countryName}</span>`;
            });
            const activeDrawerBtn = document.getElementById(`drawer-country-${id}`);
            if(activeDrawerBtn) {
                const countryName = activeDrawerBtn.querySelector('.text-sm').innerText;
                const flag = activeDrawerBtn.querySelector('.text-2xl').innerText;
                activeDrawerBtn.className = 'drawer-country-btn w-full flex items-center gap-4 p-3 rounded-xl transition-all bg-red-50 text-red-600 font-bold';
                activeDrawerBtn.innerHTML = `<span class="text-2xl">${flag}</span><span class="text-sm">${countryName}</span><i data-lucide="check" class="w-4 h-4 ml-auto text-red-500"></i>`;
            }

            const countryInfo = countryData.find(c => c.id === id);
            document.getElementById('sos-title').innerText = `สายด่วนฉุกเฉิน (${countryInfo.name})`;
            document.getElementById('sos-number').innerText = countryInfo.mainSos;
            document.getElementById('sos-link').href = `tel:${countryInfo.mainSos}`;

            // Reset search input
            document.getElementById('search-input').value = "";
            renderHotlines();
        }

        function renderHotlines(filter = "") {
            const container = document.getElementById('categories-container');
            container.innerHTML = '';
            const categories = emergencyHotlines[currentCountry] || [];

            categories.forEach(cat => {
                const filteredItems = cat.numbers.filter(n => 
                    n.name.toLowerCase().includes(filter.toLowerCase()) || 
                    (n.tel && n.tel.includes(filter)) ||
                    (n.email && n.email.includes(filter)) ||
                    n.desc.toLowerCase().includes(filter.toLowerCase())
                );

                if (filteredItems.length > 0) {
                    const isCollapsed = filter === "" ? (collapsedStates[cat.id] !== false) : false;
                    const section = document.createElement('div');
                    section.id = `cat-wrapper-${cat.id}`;
                    section.className = `bg-white rounded-3xl shadow-sm border border-gray-50 overflow-hidden transition-all ${isCollapsed ? 'collapsed' : ''}`;
                    
                    section.innerHTML = `
                        <button onclick="toggleCollapse('${cat.id}')" class="w-full flex items-center justify-between p-5 bg-white hover:bg-gray-50 active:bg-gray-100 border-b border-gray-50">
                            <div class="flex items-center gap-4 text-left">
                                <div class="bg-red-50 p-2 rounded-xl text-red-600 shrink-0">
                                    <i data-lucide="${cat.icon}" class="w-5 h-5"></i>
                                </div>
                                <h3 class="font-bold text-gray-800 text-sm leading-tight">${cat.category}</h3>
                            </div>
                            <i data-lucide="chevron-down" class="chevron-icon text-gray-400 transition-transform duration-300 shrink-0"></i>
                        </button>
                        <div class="category-content px-5 py-2 space-y-4">
                            ${filteredItems.map(n => `
                                <div class="flex justify-between items-start py-4 border-b border-gray-50 last:border-0">
                                    <div class="flex-1 pr-4">
                                        <div class="font-bold text-gray-800 text-sm">${n.name}</div>
                                        <div class="text-[11px] text-gray-400 mt-1 font-medium tracking-wide">${n.desc}</div>
                                        ${n.tel ? `<a href="tel:${n.tel}" class="text-red-600 font-black text-xl mt-1 block">${n.tel}</a>` : ''}
                                        ${n.email ? `<a href="mailto:${n.email}" class="text-blue-600 text-xs mt-1 block break-all font-medium">${n.email}</a>` : ''}
                                    </div>
                                    <div class="flex gap-2">
                                        ${n.tel ? `<a href="tel:${n.tel}" class="bg-red-50 text-red-600 p-3 rounded-2xl btn-action shadow-sm border border-red-100">
                                            <i data-lucide="phone" class="w-5 h-5"></i>
                                        </a>` : ''}
                                        ${n.email ? `<a href="mailto:${n.email}" class="bg-blue-50 text-blue-600 p-3 rounded-2xl btn-action shadow-sm border border-blue-100">
                                            <i data-lucide="mail" class="w-5 h-5"></i>
                                        </a>` : ''}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                    container.appendChild(section);
                }
            });
            lucide.createIcons();
        }

        function toggleCollapse(id) {
            const el = document.getElementById(`cat-wrapper-${id}`);
            el.classList.toggle('collapsed');
            collapsedStates[id] = el.classList.contains('collapsed');
        }

        function setupSearch() {
            document.getElementById('search-input').addEventListener('input', (e) => {
                renderHotlines(e.target.value);
            });
        }

        function switchTab(tab) {
            const sections = { hotlines: document.getElementById('hotlines-section'), map: document.getElementById('map-section') };
            const tabs = { hotlines: document.getElementById('tab-hotlines'), map: document.getElementById('tab-map') };
            Object.keys(sections).forEach(key => {
                if (key === tab) {
                    sections[key].classList.remove('hidden');
                    tabs[key].classList.add('tab-active');
                    tabs[key].classList.remove('text-gray-400');
                    if(key === 'map') setTimeout(() => { map.invalidateSize(); requestLocation(false); }, 100);
                } else {
                    sections[key].classList.add('hidden');
                    tabs[key].classList.remove('tab-active');
                    tabs[key].classList.add('text-gray-400');
                }
            });
        }

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([userCoords.lat, userCoords.lng], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OSM' }).addTo(map);
        }

        function requestLocation(manual = false) {
            if (!navigator.geolocation) return;
            document.getElementById('location-status').innerText = 'Locating...';
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    userCoords.lat = position.coords.latitude;
                    userCoords.lng = position.coords.longitude;
                    map.setView([userCoords.lat, userCoords.lng], 15);
                    document.getElementById('location-status').innerText = 'Online';
                    if (userMarker) map.removeLayer(userMarker);
                    userMarker = L.marker([userCoords.lat, userCoords.lng]).addTo(map).bindPopup("คุณอยู่ที่นี่").openPopup();
                },
                () => { document.getElementById('location-status').innerText = 'Failed'; },
                { enableHighAccuracy: true, timeout: 8000 }
            );
        }

        function searchNearby(type) {
            const query = encodeURIComponent(type);
            const url = `https://www.google.com/maps/search/${query}/@${userCoords.lat},${userCoords.lng},15z`;
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
